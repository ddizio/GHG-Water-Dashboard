<?xml version="1.0" encoding="UTF-8"?>
<!-- Vantage logo — brand-color recreation (placeholder). Swap with official asset when available. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 156" role="img" aria-label="Vantage">
  <title>Vantage</title>

  <!-- Water-drop mark: solid drop body + nested translucent brand-green bubbles -->
  <g style="isolation:isolate">
    <path d="M70 14 C 92 50 121 72 121 96 A 51 51 0 1 1 19 96 C 19 72 48 50 70 14 Z" fill="#97C93C"/>
    <circle cx="86" cy="92" r="30" fill="#00B388" opacity="0.92" style="mix-blend-mode:multiply"/>
    <circle cx="70" cy="112" r="22" fill="#008264" opacity="0.92" style="mix-blend-mode:multiply"/>
    <circle cx="92" cy="110" r="9"  fill="#00B388" opacity="0.6"  style="mix-blend-mode:multiply"/>
    <circle cx="54" cy="78"  r="12" fill="#FFFFFF" opacity="0.45"/>
  </g>

  <!-- Wordmark (Poppins, brand Fresh Green) -->
  <text x="152" y="112" font-family="Poppins, 'Century Gothic', 'Open Sans', system-ui, sans-serif"
        font-size="88" font-weight="600" letter-spacing="-1.5" fill="#00B388">Vantage</text>
  <text x="500" y="66" font-family="Poppins, system-ui, sans-serif" font-size="18"
        font-weight="500" fill="#00B388">®</text>
</svg>
